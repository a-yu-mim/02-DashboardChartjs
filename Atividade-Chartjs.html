<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
 
    <style>
    body{
        font-family:Arial, Helvetica, sans-serif;
        background-color: #f4f6f9;
        margin: 0;
        padding: 20px;
    }

    h1{
        text-align: center;
    }

    .container{
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-top: 20px;
    }

    .card{
        background-color: white;
        padding: 20px;
        border-radius: 20px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    canvas{
        width: 100%;
        height: 300px;
    }
    </style>
</head>
<body>
    <h1>Dashboard de Temperatura e Umidade</h1>

    <div class="container">

        <div class="card">
          <h3>Gráfico de Linha</h3>
          <canvas id="linha"></canvas>
        </div>

        <div class="card">
          <h3>Gráfico de Barra</h3>
          <canvas id="barra"></canvas>
        </div>
    </div>

<script>

// =========== Gráfico de linha ===========
const linha = document.getElementById('linha');
const barra = document.getElementById('barra');

new Chart(linha, {
    type: 'line',
    data:{
        // labels: Dados do eixo
        labels:[`12:00`, `13:00`,`14:00`,`15:00`,`16:00`,`17:00`],

        datasets: [
          { 
            // label: Indice do gráfico
            label: `Temperatura (°C)`, // Atalho(°) = Alt + 0176
            data: [30, 29, 28, 25, 22, 23],
            borderColor: `pink`,
            backgroundColor: `pink`,
          },
          { 
            label: `Umidade (%)`, 
            data: [80, 82, 80, 85, 80, 83],
            borderColor: `blue`,
            backgroundColor: `blue`,
          }
        ]

      }
    }
  );

  // =========== Gráfico de barra ===========
new Chart(barra, {
    type: 'bar',
    data:{
        labels:[`Janeiro`, `Fevereiro`,`Março`,`Abril`,`Maio`,`Junho`],
        datasets: [
          { 
            label: `Temperatura Média(°C)`, // Atalho(°) = Alt + 0176
            data: [22, 24, 27, 23, 20, 18],
            backgroundColor: `pink`,
          },
          { 
            label: `Umidade Méedia (%)`, 
            data: [90, 89, 93, 87, 88, 82],
            backgroundColor: `blue`,
          }
        ]
      }
    }
  );

</script>
</body>
</html>
