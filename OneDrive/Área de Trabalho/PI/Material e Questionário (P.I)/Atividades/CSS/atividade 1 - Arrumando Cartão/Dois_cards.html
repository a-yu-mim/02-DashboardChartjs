<!DOCTYPE html>
<html lang="pt-BR">

<head>
	<meta charset="UTF-8"> 
	<!-- Esse código permite acentos, cedilha, símbolos e emojis -->
	<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
	<!-- Faz a página ter o tamanho da tela do dispositivo -->

	<title>Aula CSS</title>
</head> 
<body>

<!--|------------------------------------------------------|
	| Código                | Resultado                    |
    |-----------------------|------------------------------|
    | `margin-top: 20px`    | espaço só em cima            |
    | `margin-right: 20px`  | espaço só à direita          |
    | `margin-bottom: 20px` | espaço só embaixo            |
    | `margin-left: 20px`   | espaço só à esquerda         |
    | `margin: 20px`        | espaço em **todos os lados** |
    |------------------------------------------------------|-->


	<!-- Primeiro Card -->
	<div style="width:500px; height: fit-content; background-color: aliceblue; border-radius: 25px; border: solid 2px blue; margin: 20px; padding:20px;">
<!--<div style="width:500px; height: fit-content; background-color:   aliceblue; border-radius: 25px; border: solid 8px   gold; margin: 20px"> -->
<!-- "padding" empurra o conteúdo para dentro, criando mais espaço entre conteúdo e borda. -->

  	    <div style="width: 100px; height: 100px; border-radius: 50%;">	
		<img style="width: 100%;  height: 100%; margin-top: 6px;" src="https://cdn-icons-png.flaticon.com/512/706/706830.png" alt="">
   <!-- <img style="width: 100%;  height: 100%; margin-top: 20px;" src="https://cdn-icons-png.flaticon.com/512/706/706830.png" alt=""> -->
		</div>

		<div>
		<h1 style="font-family: monospace; font-size: 30px;"> Meu nome é: 
		<span style="color:blue"> Adriana </span>
		</h1>
		
		<p style="font-family: monospace; font-size: 15px;"> 
		Mensagem: <i>A vida não é um morango! E tá tudo bem!</i>
   <!-- Mensagem: A vida não é um morango! E tá tudo bem!-->
		</p>
		</div>
	</div>



	<!-- Segundo Card -->
	<div style="width:500px; height: fit-content; background-color: aliceblue; border-radius: 25px; border: solid 2px blue; margin: 20px; padding:20px;">

		<div style="width: 100px; height: 100px; border-radius: 25px;">
		<img style="width: 100%;  height: 100%; margin-top: 6px;" src="https://cdn-icons-png.flaticon.com/256/3681/3681928.png" alt="">
		</div>

		<div>
		<h1 style="font-family: monospace; font-size: 30px;"> Meu nome é:
		<span style="color:blue"> Hugo </span>
		</h1>

		<p style="font-family: monospace; font-size: 15px;">
		Mensagem: <i>Um dia é da caça, o outro é do caçador.</i>
		</p>
		</div>
	</div>

</body>
</html>
